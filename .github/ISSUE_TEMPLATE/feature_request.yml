name: Feature Request
description: Suggest an idea or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Got an idea to make DroidStation better? Describe it below.
        Check existing issues first to avoid duplicates.

  - type: dropdown
    id: category
    attributes:
      label: Category
      description: What area does this feature belong to?
      options:
        - Desktop Environment
        - Proot / Linux Container
        - GPU / Display
        - Developer Tooling
        - Audio
        - VNC / Remote Display
        - Wine / Windows Apps
        - Theming / Appearance
        - Installer / UX
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the gap or frustration this feature would address
      placeholder: "Currently there's no way to..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Describe the solution you'd like
      description: How should this work? Be as specific as you can.
      placeholder: "I'd like the installer to..."
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches you've thought of or tried?
    validations:
      required: false

  - type: dropdown
    id: contribution
    attributes:
      label: Would you be willing to contribute this?
      options:
        - "Yes — I can open a PR"
        - "Maybe — I'd need some guidance"
        - "No — just suggesting"
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Screenshots, links, or anything else that helps explain the idea
    validations:
      required: false
