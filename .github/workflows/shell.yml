name: Shell

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint-and-smoke:
    name: Lint and smoke test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install shell tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck shfmt

      - name: Check smoke test formatting
        run: shfmt -d -i 2 -ci scripts/smoke-test.sh

      - name: Run ShellCheck
        run: shellcheck --severity=error droidstation-setup.sh install.sh uninstall.sh scripts/smoke-test.sh

      - name: Run smoke tests
        run: bash scripts/smoke-test.sh
